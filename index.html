<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>30 Min GPP</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@300;400;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  
  :root {
    --bg: #08080d;
    --card: #111118;
    --card-border: #1e1e2a;
    --text: #e8e8ef;
    --text-muted: #6b6b80;
    --strength: #22c55e;
    --strength-bg: rgba(34,197,94,0.08);
    --cardio: #3b82f6;
    --cardio-bg: rgba(59,130,246,0.08);
    --rest: #f59e0b;
    --rest-bg: rgba(245,158,11,0.08);
    --transition: #8b5cf6;
    --high: #ef4444;
    --med: #f59e0b;
    --low: #22c55e;
  }

  body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  .app {
    max-width: 480px;
    margin: 0 auto;
    padding: 12px 16px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Day Selector */
  .day-selector {
    display: flex;
    gap: 6px;
    margin-bottom: 16px;
    overflow-x: auto;
    padding: 4px 0;
    -webkit-overflow-scrolling: touch;
  }

  .day-btn {
    flex-shrink: 0;
    padding: 8px 12px;
    border: 1px solid var(--card-border);
    border-radius: 10px;
    background: var(--card);
    color: var(--text-muted);
    font-family: 'Outfit', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
    min-width: 52px;
  }

  .day-btn.active {
    background: var(--text);
    color: var(--bg);
    border-color: var(--text);
  }

  .day-btn .intensity-dot {
    display: block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    margin: 4px auto 0;
  }

  /* Day Header */
  .day-header {
    text-align: center;
    margin-bottom: 16px;
    padding: 12px;
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 14px;
  }

  .day-title {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.02em;
  }

  .day-subtitle {
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  .intensity-badge {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-top: 6px;
  }

  .intensity-high { background: rgba(239,68,68,0.15); color: var(--high); }
  .intensity-med { background: rgba(245,158,11,0.15); color: var(--med); }
  .intensity-low { background: rgba(34,197,94,0.15); color: var(--low); }

  /* Timer Display */
  .timer-section {
    text-align: center;
    padding: 20px 0;
    flex-shrink: 0;
  }

  .main-timer {
    font-family: 'JetBrains Mono', monospace;
    font-size: 72px;
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1;
    transition: color 0.3s;
  }

  .main-timer.strength { color: var(--strength); }
  .main-timer.cardio { color: var(--cardio); }
  .main-timer.rest { color: var(--rest); }
  .main-timer.transition { color: var(--transition); }

  .total-timer {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    color: var(--text-muted);
    margin-top: 6px;
  }

  /* Progress Bar */
  .progress-bar {
    width: 100%;
    height: 4px;
    background: var(--card);
    border-radius: 2px;
    margin: 12px 0;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.5s linear, background-color 0.3s;
    width: 0%;
  }

  /* Current Exercise */
  .exercise-display {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 16px;
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 18px;
    margin-bottom: 12px;
    min-height: 160px;
    transition: border-color 0.3s;
  }

  .exercise-display.strength-border { border-color: rgba(34,197,94,0.3); }
  .exercise-display.cardio-border { border-color: rgba(59,130,246,0.3); }
  .exercise-display.rest-border { border-color: rgba(245,158,11,0.3); }

  .exercise-label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin-bottom: 8px;
    padding: 3px 12px;
    border-radius: 20px;
  }

  .exercise-label.strength { background: var(--strength-bg); color: var(--strength); }
  .exercise-label.cardio { background: var(--cardio-bg); color: var(--cardio); }
  .exercise-label.rest { background: var(--rest-bg); color: var(--rest); }

  .exercise-name {
    font-size: 26px;
    font-weight: 700;
    text-align: center;
    line-height: 1.15;
    letter-spacing: -0.02em;
    margin-bottom: 6px;
  }

  .exercise-detail {
    font-size: 16px;
    color: var(--text-muted);
    text-align: center;
    font-weight: 400;
  }

  .exercise-round {
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 8px;
    font-weight: 600;
  }

  /* Up Next */
  .up-next {
    padding: 10px 14px;
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 12px;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .up-next-label {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-muted);
    white-space: nowrap;
  }

  .up-next-name {
    font-size: 14px;
    font-weight: 600;
    flex: 1;
  }

  .up-next-time {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--text-muted);
  }

  /* Controls */
  .controls {
    display: flex;
    gap: 10px;
    padding: 8px 0 16px;
    flex-shrink: 0;
  }

  .ctrl-btn {
    flex: 1;
    padding: 14px;
    border: 1px solid var(--card-border);
    border-radius: 14px;
    background: var(--card);
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .ctrl-btn:active { transform: scale(0.97); }

  .ctrl-btn.primary {
    background: var(--text);
    color: var(--bg);
    border-color: var(--text);
    flex: 2;
  }

  .ctrl-btn.primary:active { background: #ccc; }

  .ctrl-btn svg { width: 20px; height: 20px; }

  /* Workout List (pre-start) */
  .workout-list {
    flex: 1;
    overflow-y: auto;
    padding-bottom: 16px;
  }

  .block-header {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-muted);
    padding: 12px 0 6px;
    border-bottom: 1px solid var(--card-border);
    margin-bottom: 8px;
  }

  .step-item {
    display: flex;
    align-items: center;
    padding: 8px 10px;
    border-radius: 10px;
    margin-bottom: 4px;
    gap: 10px;
    font-size: 14px;
  }

  .step-item.is-rest {
    color: var(--text-muted);
    font-size: 12px;
  }

  .step-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .step-dot.strength { background: var(--strength); }
  .step-dot.cardio { background: var(--cardio); }
  .step-dot.rest { background: var(--rest); }

  .step-info { flex: 1; }
  .step-name { font-weight: 600; }
  .step-detail { font-size: 12px; color: var(--text-muted); }

  .step-time {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text-muted);
  }

  /* States */
  .hidden { display: none !important; }

  /* Completion */
  .complete-screen {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
  }

  .complete-icon {
    font-size: 64px;
    margin-bottom: 16px;
  }

  .complete-title {
    font-size: 28px;
    font-weight: 700;
  }

  .complete-subtitle {
    font-size: 15px;
    color: var(--text-muted);
    margin-top: 6px;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--card-border); border-radius: 2px; }

  /* Pulse animation for active step */
  @keyframes pulse-border {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 0.7; }
  }

  .exercise-display.active-pulse {
    animation: pulse-border 2s ease-in-out infinite;
  }

  /* Countdown flash */
  @keyframes countdown-flash {
    0% { transform: scale(1); }
    50% { transform: scale(1.05); }
    100% { transform: scale(1); }
  }

  .timer-flash {
    animation: countdown-flash 0.3s ease;
  }

  /* Transition Pause */
  .exercise-display.transition-pause {
    border-color: rgba(139, 92, 246, 0.4);
    background: linear-gradient(180deg, rgba(139, 92, 246, 0.06) 0%, var(--card) 100%);
  }

  .setup-label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--transition);
    background: rgba(139, 92, 246, 0.1);
    padding: 3px 12px;
    border-radius: 20px;
    margin-bottom: 8px;
  }

  /* Voice Control */
  .voice-btn {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: 1px solid var(--card-border);
    background: var(--card);
    color: var(--text-muted);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .voice-btn svg { width: 20px; height: 20px; }

  .voice-btn.active {
    border-color: var(--text);
    color: var(--bg);
    background: var(--text);
  }

  .voice-btn.active.listening {
    animation: pulse-mic 1.5s ease-in-out infinite;
  }

  @keyframes pulse-mic {
    0%, 100% { box-shadow: 0 0 0 0 rgba(232, 232, 239, 0.3); }
    50% { box-shadow: 0 0 0 8px rgba(232, 232, 239, 0); }
  }

  /* ====== LOG & HISTORY SYSTEM ====== */
  .sheet-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.6);
    z-index: 100; opacity: 0; pointer-events: none;
    transition: opacity 0.25s;
  }
  .sheet-overlay.visible { opacity: 1; pointer-events: all; }

  .bottom-sheet {
    position: fixed; left: 0; right: 0; bottom: 0;
    height: 97vh;
    background: var(--card);
    border-radius: 20px 20px 0 0;
    border-top: 1px solid var(--card-border);
    z-index: 101;
    transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .bottom-sheet.visible { transform: translateY(0); }

  .sheet-handle {
    width: 36px; height: 4px; background: var(--card-border);
    border-radius: 2px; margin: 12px auto 4px; flex-shrink: 0;
  }

  .sheet-scroll { flex: 1; overflow-y: auto; padding: 0 20px 16px; }

  .sheet-section-label {
    font-size: 10px; font-weight: 700; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--text-muted);
    margin: 18px 0 8px;
  }

  .history-entry {
    padding: 10px 12px; background: var(--bg);
    border-radius: 10px; margin-bottom: 6px;
  }
  .history-entry-name { font-size: 12px; font-weight: 600; color: var(--text-muted); margin-bottom: 2px; }
  .history-entry-value { font-size: 15px; font-weight: 600; }
  .history-entry-date { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .history-empty { font-size: 14px; color: var(--text-muted); padding: 12px 0; text-align: center; }

  .log-exercise-name { font-size: 22px; font-weight: 700; margin-bottom: 2px; }
  .log-exercise-round { font-size: 13px; color: var(--text-muted); margin-bottom: 16px; }

  .log-input {
    width: 100%; padding: 14px 16px;
    background: var(--bg); border: 1px solid var(--card-border);
    border-radius: 12px; color: var(--text);
    font-family: 'Outfit', sans-serif; font-size: 17px; font-weight: 500;
    outline: none; margin-bottom: 10px; -webkit-appearance: none;
  }
  .log-input:focus { border-color: var(--text); }
  .log-input::placeholder { color: var(--text-muted); }

  .machine-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
  .machine-field-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); margin-bottom: 4px; }
  .machine-field-prescribed { font-size: 11px; color: var(--text-muted); margin-bottom: 6px; }

  .toggle-done {
    width: 100%; padding: 18px;
    border-radius: 12px; border: 2px solid var(--card-border);
    background: var(--bg); color: var(--text-muted);
    font-family: 'Outfit', sans-serif; font-size: 16px; font-weight: 600;
    cursor: pointer; transition: all 0.15s; margin-bottom: 10px;
  }
  .toggle-done.checked { background: rgba(34,197,94,0.12); border-color: var(--strength); color: var(--strength); }

  .sheet-actions {
    display: flex; gap: 10px;
    padding: 12px 20px 32px; flex-shrink: 0;
    border-top: 1px solid var(--card-border);
    background: var(--card);
  }
  .sheet-btn {
    flex: 1; padding: 15px; border-radius: 14px;
    border: 1px solid var(--card-border); background: var(--card);
    color: var(--text-muted); font-family: 'Outfit', sans-serif;
    font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.15s;
  }
  .sheet-btn.primary { background: var(--text); color: var(--bg); border-color: var(--text); flex: 2; }
  .sheet-btn:active { transform: scale(0.97); }

  .gear-btn {
    width: 36px; height: 36px; border-radius: 50%;
    border: 1px solid var(--card-border); background: var(--card);
    color: var(--text-muted); display: flex; align-items: center;
    justify-content: center; cursor: pointer; transition: all 0.2s;
  }
  .gear-btn svg { width: 16px; height: 16px; }

  .sync-status {
    position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
    background: var(--card); border: 1px solid var(--card-border);
    border-radius: 20px; padding: 8px 18px;
    font-size: 13px; font-weight: 600; z-index: 200;
    transition: opacity 0.3s; white-space: nowrap;
  }
  .sync-status.hidden { display: none; }
  .sync-status.error { color: var(--high); border-color: rgba(239,68,68,0.3); }
  .sync-status.ok { color: var(--strength); border-color: rgba(34,197,94,0.3); }

  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7);
    z-index: 300; display: flex; align-items: center; justify-content: center; padding: 20px;
  }
  .modal-overlay.hidden { display: none; }
  .modal-box { background: var(--card); border: 1px solid var(--card-border); border-radius: 20px; padding: 24px; width: 100%; max-width: 420px; }
  .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
  .modal-desc { font-size: 13px; color: var(--text-muted); margin-bottom: 18px; line-height: 1.6; }
  .modal-input {
    width: 100%; padding: 12px 14px; background: var(--bg);
    border: 1px solid var(--card-border); border-radius: 10px;
    color: var(--text); font-family: 'Outfit', sans-serif; font-size: 14px;
    outline: none; margin-bottom: 8px; -webkit-appearance: none;
  }
  .modal-input:focus { border-color: var(--text); }
  .modal-actions { display: flex; gap: 8px; margin-top: 4px; }
  .modal-btn {
    flex: 1; padding: 12px; border-radius: 12px;
    border: 1px solid var(--card-border); background: var(--card);
    color: var(--text); font-family: 'Outfit', sans-serif;
    font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.15s;
  }
  .modal-btn.primary { background: var(--text); color: var(--bg); border-color: var(--text); }
  .modal-btn:active { transform: scale(0.97); }

  .history-preview-btn {
    width: 100%; padding: 11px; border: 1px solid var(--card-border);
    border-radius: 12px; background: var(--card); color: var(--text-muted);
    font-family: 'Outfit', sans-serif; font-size: 14px; font-weight: 600;
    cursor: pointer; margin-bottom: 14px; display: flex;
    align-items: center; justify-content: center; gap: 8px;
  }

  .presession-block-header {
    font-size: 10px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.1em; color: var(--text-muted);
    padding: 12px 0 6px; border-bottom: 1px solid var(--card-border); margin-bottom: 6px;
  }
  .presession-entry {
    padding: 8px 10px; background: var(--bg); border-radius: 10px; margin-bottom: 4px;
  }
  .presession-entry-round { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 1px; }
  .presession-entry-name { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
  .presession-entry-value { font-size: 13px; }
  .no-history-msg { text-align: center; padding: 32px 20px; color: var(--text-muted); font-size: 14px; line-height: 1.6; }
  .presession-date-header { font-size: 16px; font-weight: 700; margin: 18px 0 4px; }
  .presession-sub-block { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); margin: 10px 0 5px; }
</style>
</head>
<body>
<div class="app" id="app">
  <!-- Day Selector -->
  <div class="day-selector" id="daySelector"></div>

  <!-- Day Header -->
  <div class="day-header" id="dayHeader" style="position:relative;">
    <div class="day-title" id="dayTitle"></div>
    <div class="day-subtitle" id="daySubtitle"></div>
    <div class="intensity-badge" id="intensityBadge"></div>
    <button class="gear-btn" onclick="openSettings()" style="position:absolute;top:8px;right:8px;" title="Settings">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19.14 12.94c.04-.3.06-.61.06-.94s-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.04.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.21.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
    </button>
  </div>

  <!-- Controls -->
  <div class="controls" id="controls">
    <button class="ctrl-btn primary" id="startBtn" onclick="startWorkout()">
      <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
      Start
    </button>
  </div>

  <!-- Pre-Start: Workout Preview -->
  <div class="workout-list" id="workoutList"></div>

  <!-- Active Workout -->
  <div class="hidden" id="activeWorkout">
    <div class="timer-section">
      <div class="main-timer" id="mainTimer">0:00</div>
      <div class="total-timer" id="totalTimer">Total: 30:00</div>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="exercise-display" id="exerciseDisplay">
      <div class="exercise-label" id="exerciseLabel"></div>
      <div class="exercise-name" id="exerciseName"></div>
      <div class="exercise-detail" id="exerciseDetail"></div>
      <div class="exercise-round" id="exerciseRound"></div>
    </div>
    <div class="up-next" id="upNext">
      <div class="up-next-label">UP NEXT</div>
      <div class="up-next-name" id="upNextName"></div>
      <div class="up-next-time" id="upNextTime"></div>
    </div>
  </div>

  <!-- Complete -->
  <div class="complete-screen hidden" id="completeScreen">
    <div class="complete-icon">&#9889;</div>
    <div class="complete-title">Done.</div>
    <div class="complete-subtitle" id="completeSubtitle">30 minutes in the books.</div>
  </div>

  <!-- Sync Status Toast -->
  <div class="sync-status hidden" id="syncStatus"></div>

  <!-- Sheet Overlay -->
  <div class="sheet-overlay" id="sheetOverlay"></div>

  <!-- Log Card Sheet -->

// Helper to build straight sets
function straightSets(name, detail, sets, workSec, restSec, block) {
  const steps = [];
  for (let i = 0; i < sets; i++) {
    steps.push({cat: "strength", name, detail, duration: workSec, block, round: `Set ${i+1}/${sets}`});
    if (i < sets - 1) steps.push({cat: "rest", name: "Rest", detail: "", duration: restSec, block});
  }
  return steps;
}

// Helper for supersets
function superset(exercises, rounds, restBetween, block) {
  const steps = [];
  for (let r = 0; r < rounds; r++) {
    exercises.forEach((ex, i) => {
      steps.push({cat: "strength", name: ex.name, detail: ex.detail, duration: ex.dur, block, round: `Round ${r+1}/${rounds}`});
      if (i < exercises.length - 1) {
        steps.push({cat: "rest", name: "Transition", detail: "Next exercise", duration: 8, block});
      }
    });
    if (r < rounds - 1) steps.push({cat: "rest", name: "Rest", detail: "", duration: restBetween, block});
  }
  return steps;
}

// Helper for circuit
function circuit(exercises, rounds, restBetweenEx, restBetweenRounds, block) {
  const steps = [];
  for (let r = 0; r < rounds; r++) {
    exercises.forEach((ex, i) => {
      steps.push({cat: ex.cat || "strength", name: ex.name, detail: ex.detail, duration: ex.dur, block, round: `Round ${r+1}/${rounds}`});
      if (i < exercises.length - 1 && restBetweenEx > 0) {
        steps.push({cat: "rest", name: "Transition", detail: "Next exercise", duration: restBetweenEx, block});
      }
    });
    if (r < rounds - 1 && restBetweenRounds > 0) steps.push({cat: "rest", name: "Rest", detail: "", duration: restBetweenRounds, block});
  }
  return steps;
}

function cardioBlock(name, detail, duration, block) {
  return [{cat: "cardio", name, detail, duration, block}];
}

function intervals(workName, workDetail, workDur, restName, restDetail, restDur, rounds, block) {
  const steps = [];
  for (let i = 0; i < rounds; i++) {
    steps.push({cat: "cardio", name: workName, detail: workDetail, duration: workDur, block, round: `Interval ${i+1}/${rounds}`});
    if (i < rounds - 1 || restDur > 0) {
      if (i < rounds - 1) steps.push({cat: "rest", name: restName || "Rest", detail: restDetail || "", duration: restDur, block});
    }
  }
  return steps;
}

function transition(dur) {
  return [{cat: "rest", name: "Transition", detail: "Set up next block", duration: dur}];

// Audio
function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function beep(freq, duration, type = 'sine') {
  if (!audioCtx) return;
  try {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.frequency.value = freq;
    osc.type = type;
    gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
    osc.start(audioCtx.currentTime);
    osc.stop(audioCtx.currentTime + duration);
  } catch(e) {}
}

function beepTransition() { beep(880, 0.15); setTimeout(() => beep(1100, 0.2), 160); }
function beepCountdown() { beep(660, 0.1); }
function beepComplete() { beep(880, 0.1); setTimeout(() => beep(1100, 0.1), 120); setTimeout(() => beep(1320, 0.25), 240); }

// Voice Control
function initVoice() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return;
  voiceAvailable = true;
  recognition = new SR();
  recognition.continuous = true;
  recognition.interimResults = false;
  recognition.lang = 'en-US';

  recognition.onresult = (event) => {
    for (let i = event.resultIndex; i < event.results.length; i++) {
      if (event.results[i].isFinal) {
        handleVoiceCommand(event.results[i][0].transcript.toLowerCase().trim());
      }
    }
  };

  recognition.onend = () => {
    if (voiceEnabled && document.visibilityState === 'visible' && isRunning) {
      setTimeout(() => {
        if (voiceEnabled && document.visibilityState === 'visible') {
          try { recognition.start(); } catch(e) {}
        }
      }, 300);
    }
  };

  recognition.onerror = (event) => {
    if (event.error === 'not-allowed') {
      voiceEnabled = false;
      updateControls();
    }
  };
}

function handleVoiceCommand(text) {
  if (!text.includes('coach')) return;
  if (text.includes('go') || text.includes('start') || text.includes('resume') || text.includes('ready')) {
    if (isPaused && isRunning) togglePause();
  } else if (text.includes('pause') || text.includes('stop') || text.includes('hold')) {
    if (!isPaused && isRunning) togglePause();
  } else if (text.includes('skip') || text.includes('next')) {
    if (isRunning) skipStep();
  }
}

function toggleVoice() {
  if (!voiceAvailable) return;
  voiceEnabled = !voiceEnabled;
  if (voiceEnabled) {
    try { recognition.start(); } catch(e) {}
  } else {
    try { recognition.stop(); } catch(e) {}
  }
  updateControls();
}

function stopVoice() {
  voiceEnabled = false;
  if (recognition) { try { recognition.abort(); } catch(e) {} }
  updateControls();
}

// Format seconds as M:SS
function fmt(s) {
  s = Math.max(0, Math.ceil(s));
  return Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0');
}

// Render day selector
function renderDaySelector() {
  const el = document.getElementById('daySelector');
  el.innerHTML = '';
  DAYS.forEach((day, i) => {
    const btn = document.createElement('button');
    btn.className = 'day-btn' + (i === currentDay ? ' active' : '');
    const color = day.intensity === 'high' ? 'var(--high)' : day.intensity === 'med' ? 'var(--med)' : 'var(--low)';
    btn.innerHTML = `D${i+1}<span class="intensity-dot" style="background:${color}"></span>`;
    btn.onclick = () => { if (!isRunning) selectDay(i); };
    el.appendChild(btn);
  });
}

  currentDay = i;

  resetWorkout();

  el.innerHTML = '';

  // Add history button
  const histBtn = document.createElement('button');
  histBtn.className = 'history-preview-btn';
  histBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="currentColor" style="width:16px;height:16px"><path d="M13 3a9 9 0 0 0-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42A8.954 8.954 0 0 0 13 21a9 9 0 0 0 0-18zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z"/></svg> View History';
  histBtn.onclick = showSessionHistory;
  el.appendChild(histBtn);

  let lastBlock = '';
  steps.forEach(step => {
    if (step.block && step.block !== lastBlock && step.cat !== 'rest') {
      lastBlock = step.block;
      const header = document.createElement('div');
      header.className = 'block-header';
      header.textContent = step.block;
      el.appendChild(header);
    }
    
    const item = document.createElement('div');
    item.className = 'step-item' + (step.cat === 'rest' ? ' is-rest' : '');
    
    if (step.cat === 'rest' && step.name === 'Transition' && step.duration <= 10) return; // hide tiny transitions in list
    
    item.innerHTML = `
      <span class="step-dot ${step.cat}"></span>
      <div class="step-info">
        <div class="step-name">${step.name}</div>
        ${step.detail ? `<div class="step-detail">${step.detail}</div>` : ''}
      </div>
      <div class="step-time">${fmt(step.duration)}</div>
    `;
    el.appendChild(item);
  });
}

function resetWorkout() {
  isRunning = false;
  isPaused = false;
  isTransitionPause = false;
  currentStep = 0;
  stepTimeLeft = 0;
  totalElapsed = 0;
  if (intervalId) { clearInterval(intervalId); intervalId = null; }

  document.getElementById('workoutList').classList.remove('hidden');
  document.getElementById('activeWorkout').classList.add('hidden');
  document.getElementById('completeScreen').classList.add('hidden');

  renderStartControls();
}

function startWorkout() {
  initAudio();
  isRunning = true;
  isPaused = false;
  currentStep = 0;
  totalElapsed = 0;
  
  const steps = DAYS[currentDay].steps;
  stepTimeLeft = steps[0].duration;
  
  document.getElementById('workoutList').classList.add('hidden');
  document.getElementById('activeWorkout').classList.remove('hidden');
  document.getElementById('completeScreen').classList.add('hidden');
  
  updateDisplay();
  updateControls();

  beepTransition();
  if (voiceEnabled && recognition) { try { recognition.start(); } catch(e) {} }

  intervalId = setInterval(tick, 1000);
}

function tick() {
  if (isPaused) return;
  
  stepTimeLeft--;
  totalElapsed++;
  
  const steps = DAYS[currentDay].steps;
  
  // Countdown beeps at 3, 2, 1
  if (stepTimeLeft <= 3 && stepTimeLeft > 0) {
    beepCountdown();
    document.getElementById('mainTimer').classList.add('timer-flash');
    setTimeout(() => document.getElementById('mainTimer').classList.remove('timer-flash'), 300);
  }
  
  if (stepTimeLeft <= 0) {
    const completedStep = steps[currentStep];
    const logType = getLogType(completedStep);
    if (logType) {
      isPaused = true;
      currentLogStep = completedStep;
      showLogCard(completedStep, advanceStep);
      updateControls();
      return;
    }
    advanceStep();
    return;
  }

  updateDisplay();
}

function updateDisplay() {
  const steps = DAYS[currentDay].steps;
  const step = steps[currentStep];
  
  // Main timer
  const timer = document.getElementById('mainTimer');
  timer.textContent = fmt(stepTimeLeft);
  timer.className = 'main-timer ' + step.cat;
  
  // Total timer
  document.getElementById('totalTimer').textContent = `Total: ${fmt(1800 - totalElapsed)}`;
  
  // Progress
  const fill = document.getElementById('progressFill');
  fill.style.width = (totalElapsed / 1800 * 100) + '%';
  const fillColor = step.cat === 'strength' ? 'var(--strength)' : step.cat === 'cardio' ? 'var(--cardio)' : 'var(--rest)';
  fill.style.background = fillColor;
  
  // Exercise display
  const display = document.getElementById('exerciseDisplay');

  if (isTransitionPause) {
    display.className = 'exercise-display transition-pause';
    document.getElementById('exerciseLabel').textContent = 'SET UP';
    document.getElementById('exerciseLabel').className = 'setup-label';
    document.getElementById('exerciseName').textContent = step.name;
    document.getElementById('exerciseDetail').textContent = step.detail || '';
    document.getElementById('exerciseRound').textContent = voiceEnabled ? 'Say "coach, go" or tap Go' : 'Tap Go when ready';
  } else {
    display.className = 'exercise-display ' + step.cat + '-border';
    const label = document.getElementById('exerciseLabel');
    label.textContent = step.cat === 'rest' ? 'REST' : step.cat === 'cardio' ? 'CARDIO' : 'STRENGTH';
    label.className = 'exercise-label ' + step.cat;
    document.getElementById('exerciseName').textContent = step.name;
    document.getElementById('exerciseDetail').textContent = step.detail || '';
    document.getElementById('exerciseRound').textContent = step.round || '';
  }
  
  // Up next
  const upNext = document.getElementById('upNext');
  if (currentStep < steps.length - 1) {
    let nextWorkStep = null;
    for (let i = currentStep + 1; i < steps.length; i++) {
      if (steps[i].cat !== 'rest' || steps[i].duration > 15) {
        nextWorkStep = steps[i];
        break;
      }
    }
    if (nextWorkStep) {
      upNext.classList.remove('hidden');
      document.getElementById('upNextName').textContent = nextWorkStep.name + (nextWorkStep.detail ? ' — ' + nextWorkStep.detail : '');
      document.getElementById('upNextTime').textContent = fmt(nextWorkStep.duration);
    } else {
      upNext.classList.add('hidden');
    }
  } else {
    upNext.classList.add('hidden');
  }
}

function micButton() {
  if (!voiceAvailable) return '';
  const micSvg = `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5-3c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>`;
  return `<button class="voice-btn${voiceEnabled ? ' active listening' : ''}" onclick="toggleVoice()" title="Voice: say 'coach go/pause/skip'">${micSvg}</button>`;
}

function renderStartControls() {
  document.getElementById('controls').innerHTML = `
    <button class="ctrl-btn primary" onclick="startWorkout()">
      <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
      Start Workout
    </button>
    ${micButton()}
  `;
}

function updateControls() {
  const controls = document.getElementById('controls');
  if (!isRunning) { renderStartControls(); return; }

  if (isPaused) {
    controls.innerHTML = `
      <button class="ctrl-btn" onclick="resetWorkout()">Reset</button>
      <button class="ctrl-btn primary" onclick="togglePause()">
        <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
        ${isTransitionPause ? 'Go' : 'Resume'}
      </button>
      ${micButton()}
      <button class="ctrl-btn" onclick="skipStep()">Skip</button>
    `;
  } else {
    controls.innerHTML = `
      <button class="ctrl-btn" onclick="resetWorkout()">Reset</button>
      <button class="ctrl-btn primary" onclick="togglePause()">
        <svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
        Pause
      </button>
      ${micButton()}
      <button class="ctrl-btn" onclick="skipStep()">Skip</button>
    `;
  }
}

function togglePause() {
  if (logPauseActive) return;
  isPaused = !isPaused;
  if (!isPaused) isTransitionPause = false;
  updateControls();
  updateDisplay();
}

function skipStep() {
  if (logPauseActive) { dismissLogSheet(false); return; }
  const steps = DAYS[currentDay].steps;
  const step = steps[currentStep];
  const logType = getLogType(step);
  totalElapsed += stepTimeLeft;
  stepTimeLeft = 0;
  if (logType) {
    isPaused = true;
    currentLogStep = step;
    showLogCard(step, advanceStep);
    updateControls();
    return;
  }
  advanceStep();
}

function completeWorkout() {
  isRunning = false;
  stopVoice();
  if (intervalId) { clearInterval(intervalId); intervalId = null; }
  
  document.getElementById('activeWorkout').classList.add('hidden');
  document.getElementById('completeScreen').classList.remove('hidden');
  
  const day = DAYS[currentDay];
  document.getElementById('completeSubtitle').textContent = `${day.name}: ${day.title} — 30 minutes done.`;
  
  beepComplete();
  
  document.getElementById('controls').innerHTML = `
    <button class="ctrl-btn primary" onclick="nextDay()">
      Next Day
    </button>
    <button class="ctrl-btn" onclick="selectDay(currentDay)">
      Repeat
    </button>
  `;
}

function nextDay() {
  currentDay = (currentDay + 1) % 7;
  selectDay(currentDay);
}

// Init
(function init() {
  loadWorkoutLog();

  try {
    const saved = localStorage.getItem('gpp_lastDay');
    if (saved !== null) currentDay = parseInt(saved);
  } catch(e) {}

  // Validate all days = 1800s
  DAYS.forEach((day, i) => {
    const total = day.steps.reduce((s, x) => s + x.duration, 0);
    if (total !== 1800) {
      console.warn(`Day ${i+1} total: ${total}s (expected 1800s, diff: ${1800-total}s)`);
    }
  });
  
  initVoice();
  renderDaySelector();
  renderDayHeader();
  renderWorkoutList();
  renderStartControls();
})();

// ============================================
// WORKOUT LOG SYSTEM
// ============================================

const REPO_OWNER = 'newcomerd33-wq';
const REPO_NAME = 'GPP-30min';
const LOG_FILE = 'workout-log.json';

function getPAT() {
  try { return localStorage.getItem('gpp_pat') || ''; } catch(e) { return ''; }
}

async function loadWorkoutLog() {
  try {
    const url = `https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/main/${LOG_FILE}?t=${Date.now()}`;
    const res = await fetch(url);
    if (res.ok) workoutLog = await res.json();
    else workoutLog = [];
  } catch(e) { workoutLog = []; }
  const pat = getPAT();
  if (pat) await fetchFileSha(pat);
}

async function fetchFileSha(pat) {
  try {
    const res = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${LOG_FILE}`, {
      headers: { 'Authorization': `token ${pat}`, 'Accept': 'application/vnd.github.v3+json' }
    });
    if (res.ok) { const d = await res.json(); logFileSha = d.sha; }
    else if (res.status === 404) logFileSha = null;
  } catch(e) {}
}

async function saveCurrentLog() {
  const pat = getPAT();
  if (!pat) { showSyncStatus('No token — not synced to GitHub', 'error'); return; }
  try {
    await fetchFileSha(pat);
    const content = btoa(unescape(encodeURIComponent(JSON.stringify(workoutLog, null, 2))));
    const body = { message: `Log ${new Date().toISOString().slice(0,10)}`, content };
    if (logFileSha) body.sha = logFileSha;
    const res = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${LOG_FILE}`, {
      method: 'PUT',
      headers: { 'Authorization': `token ${pat}`, 'Content-Type': 'application/json', 'Accept': 'application/vnd.github.v3+json' },
      body: JSON.stringify(body)
    });
    if (res.ok) { const d = await res.json(); logFileSha = d.content.sha; showSyncStatus('Saved \u2713', 'ok'); }
    else showSyncStatus('Sync failed', 'error');
  } catch(e) { showSyncStatus('Sync failed', 'error'); }
}

function showSyncStatus(msg, type) {
  const el = document.getElementById('syncStatus');
  el.textContent = msg;
  el.className = `sync-status ${type}`;
  setTimeout(() => el.classList.add('hidden'), 3000);
}

function openSettings() {
  const pat = getPAT();
  document.getElementById('patInput').value = '';
  document.getElementById('patInput').placeholder = pat ? '(token saved — paste new to replace)' : 'github_pat_...';
  document.getElementById('patStatus').textContent = pat ? 'Token is saved on this device.' : 'No token saved yet.';
  document.getElementById('settingsModal').classList.remove('hidden');
}
function closeSettings() { document.getElementById('settingsModal').classList.add('hidden'); }
function savePAT() {
  const val = document.getElementById('patInput').value.trim();
  if (val) { try { localStorage.setItem('gpp_pat', val); } catch(e) {} fetchFileSha(val); showSyncStatus('Token saved', 'ok'); }
  closeSettings();
}
function clearPAT() {
  try { localStorage.removeItem('gpp_pat'); } catch(e) {}
  document.getElementById('patInput').value = '';
  document.getElementById('patStatus').textContent = 'Token cleared.';
}

function getLogType(step) {
  if (!step || step.cat === 'rest') return null;
  if (step.name === 'Active Rest' || step.name === 'Transition') return null;
  if (step.cat === 'strength') return 'text';
  if (step.name === 'Walking Pad') return 'machine';
  if (/\d+\s*(rep|slam|\/side|snatch)/i.test(step.detail)) return 'text';
  return 'toggle';
}

function parseWalkingPad(detail) {
  const im = detail.match(/(\d+(?:\.\d+)?)\s*%/);
  const sm = detail.match(/(\d+(?:\.\d+)?)\s*mph/);
  return { incline: im ? parseFloat(im[1]) : '', speed: sm ? parseFloat(sm[1]) : '' };
}

function getLastSessionEntries(dayName, block, round) {
  const today = new Date().toISOString().slice(0,10);
  const relevant = workoutLog.filter(e => e.day === dayName && e.block === block && e.round === round && e.date !== today);
  if (!relevant.length) return [];
  const lastDate = [...new Set(relevant.map(e => e.date))].sort().reverse()[0];
  return relevant.filter(e => e.date === lastDate);
}

function openSheet(id) {
  document.getElementById('sheetOverlay').classList.add('visible');
  document.getElementById(id).classList.add('visible');
}
function closeSheet(id) {
  document.getElementById('sheetOverlay').classList.remove('visible');
  document.getElementById(id).classList.remove('visible');
}

function showLogCard(completedStep, onDone) {
  pendingAdvance = onDone;
  logToggleChecked = false;
  logPauseActive = true;

  const day = DAYS[currentDay];
  const block = completedStep.block || completedStep.name;
  const round = completedStep.round || '';
  const logType = getLogType(completedStep);

  const histEntries = getLastSessionEntries(day.name, block, round);
  let histHTML = '';
  if (histEntries.length) {
    const dateLabel = histEntries[0].date;
    histHTML = histEntries.map(e => {
      let v = '';
      if (e.type === 'machine') v = `<span style="color:var(--cardio)">${e.incline}% \u00b7 ${e.speed} mph</span>`;
      else if (e.type === 'toggle') v = e.completed ? `<span style="color:var(--strength)">\u2713 Done</span>` : `<span style="color:var(--text-muted)">Skipped</span>`;
      else v = `<span>${e.value || '\u2014'}</span>`;
      return `<div class="history-entry"><div class="history-entry-name">${e.exerciseName}</div><div class="history-entry-value">${v}</div><div class="history-entry-date">${dateLabel}</div></div>`;
    }).join('');
  } else {
    histHTML = `<div class="history-empty">No history yet for this block.</div>`;
  }

  let inputHTML = '';
  if (logType === 'text') {
    inputHTML = `<input class="log-input" id="logTextInput" type="text" placeholder="e.g. 135 x 5, RPE 8..." autocomplete="off">`;
  } else if (logType === 'machine') {
    const p = parseWalkingPad(completedStep.detail);
    inputHTML = `<div class="machine-fields">
      <div>
        <div class="machine-field-label">Incline %</div>
        <div class="machine-field-prescribed">Prescribed: ${p.incline}%</div>
        <input class="log-input" id="logInclineInput" type="number" step="0.5" value="${p.incline}" style="margin-bottom:0">
      </div>
      <div>
        <div class="machine-field-label">Speed mph</div>
        <div class="machine-field-prescribed">Prescribed: ${p.speed} mph</div>
        <input class="log-input" id="logSpeedInput" type="number" step="0.1" value="${p.speed}" style="margin-bottom:0">
      </div>
    </div>`;
  } else {
    inputHTML = `<button class="toggle-done" id="logToggleBtn" onclick="toggleLogDone()">Tap to mark done</button>`;
  }

  document.getElementById('logSheetContent').innerHTML = `
    <div class="sheet-section-label">Last time \u00b7 ${block}</div>
    ${histHTML}
    <div class="sheet-section-label">Log this set</div>
    <div class="log-exercise-name">${completedStep.name}</div>
    <div class="log-exercise-round">${round}${round && completedStep.detail ? ' \u00b7 ' : ''}${completedStep.detail || ''}</div>
    ${inputHTML}
  `;

  openSheet('logSheet');
  if (logType === 'text') setTimeout(() => { const i = document.getElementById('logTextInput'); if (i) i.focus(); }, 350);
}

function toggleLogDone() {
  logToggleChecked = !logToggleChecked;
  const btn = document.getElementById('logToggleBtn');
  if (btn) { btn.textContent = logToggleChecked ? '\u2713 Done' : 'Tap to mark done'; btn.classList.toggle('checked', logToggleChecked); }
}

function dismissLogSheet(save) {
  if (save && currentLogStep) {
    const step = currentLogStep;
    const logType = getLogType(step);
    const entry = {
      date: new Date().toISOString().slice(0,10),
      day: DAYS[currentDay].name,
      block: step.block || step.name,
      round: step.round || '',
      exerciseName: step.name,
      type: logType
    };
    if (logType === 'text') {
      const inp = document.getElementById('logTextInput');
      entry.value = inp ? inp.value.trim() : '';
    } else if (logType === 'machine') {
      const inc = document.getElementById('logInclineInput');
      const spd = document.getElementById('logSpeedInput');
      entry.incline = inc ? parseFloat(inc.value) : null;
      entry.speed = spd ? parseFloat(spd.value) : null;
      entry.completed = true;
    } else {
      entry.completed = logToggleChecked;
    }
    workoutLog.push(entry);
    saveCurrentLog();
  }
  closeSheet('logSheet');
  logPauseActive = false;
  currentLogStep = null;
  if (pendingAdvance) { const fn = pendingAdvance; pendingAdvance = null; fn(); }
}

function showSessionHistory() {
  const day = DAYS[currentDay];
  const entries = workoutLog.filter(e => e.day === day.name).sort((a,b) => b.date.localeCompare(a.date));
  const content = document.getElementById('historySheetContent');

  if (!entries.length) {
    content.innerHTML = `<div style="padding:20px 0 6px;font-size:18px;font-weight:700;">${day.name}: ${day.title}</div><div class="no-history-msg">No workout history yet.<br>Complete this day to start building your log.</div>`;
    openSheet('historySheet');
    return;
  }

  const dates = [...new Set(entries.map(e => e.date))].sort().reverse();
  let html = `<div style="padding:20px 0 6px;font-size:18px;font-weight:700;">${day.name}: ${day.title}</div>`;

  dates.forEach(date => {
    const de = entries.filter(e => e.date === date);
    html += `<div class="presession-date-header">${date}</div>`;
    const blocks = [...new Set(de.map(e => e.block))];
    blocks.forEach(block => {
      const be = de.filter(e => e.block === block);
      if (block) html += `<div class="presession-sub-block">${block}</div>`;
      be.forEach(e => {
        let v = '';
        if (e.type === 'machine') v = `<span style="color:var(--cardio)">${e.incline}% \u00b7 ${e.speed} mph \u2713</span>`;
        else if (e.type === 'toggle') v = e.completed ? `<span style="color:var(--strength)">\u2713 Done</span>` : `<span style="color:var(--text-muted)">Skipped</span>`;
        else v = `<span>${e.value || '\u2014'}</span>`;
        html += `<div class="presession-entry"><div class="presession-entry-round">${e.round || ''}</div><div class="presession-entry-name">${e.exerciseName}</div><div class="presession-entry-value">${v}</div></div>`;
      });
    });
  });

  content.innerHTML = html;
  openSheet('historySheet');
}

function closeHistorySheet() { closeSheet('historySheet'); }

function advanceStep() {
  const steps = DAYS[currentDay].steps;
  currentStep++;
  if (currentStep >= steps.length) { completeWorkout(); return; }
  const nextStep = steps[currentStep];
  if (nextStep.name === "Transition" && nextStep.detail === "Set up next block") {
    totalElapsed += nextStep.duration;
    currentStep++;
    if (currentStep >= steps.length) { completeWorkout(); return; }
    stepTimeLeft = steps[currentStep].duration;
    isPaused = true;
    isTransitionPause = true;
    updateDisplay();
    updateControls();
    beepTransition();
    return;
  }
  stepTimeLeft = nextStep.duration;
  isPaused = false;
  isTransitionPause = false;
  beepTransition();
  updateDisplay();
  updateControls();
}

// Prevent screen sleep
let wakeLock = null;
async function requestWakeLock() {
  try {
    if ('wakeLock' in navigator) {
      wakeLock = await navigator.wakeLock.request('screen');
    }
  } catch(e) {}
}
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && isRunning) requestWakeLock();
  if (document.visibilityState === 'hidden') stopVoice();
});
window.addEventListener('pagehide', stopVoice);
window.addEventListener('beforeunload', stopVoice);
const origStart = startWorkout;
startWorkout = function() {
  requestWakeLock();
  origStart();
};
</script>
